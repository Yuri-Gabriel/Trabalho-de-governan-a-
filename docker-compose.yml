services:
  db:
    image: mariadb:latest
    container_name: sam_ti_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: "sam_ti"
      MARIADB_USER: "sam_ti_user"
      MARIADB_PASSWORD: "sam_ti_pass"
      MARIADB_ROOT_PASSWORD: "root_pass"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  web:
    build: .
    container_name: sam_ti_web
    ports:
      - "2332:2332"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/app

volumes:
  mariadb_data:
