{% extends 'base.html' %}
{% block content %}
<section class="hero">
  <div class="card auth-card">
    <h2>Recuperar senha</h2>
    <p>Informe seu e-mail para receber o link de redefinição.</p>
    <form method="post" class="form-grid">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Enviar e-mail</button>
    </form>
    <div class="auth-links">
      <a href="{% url 'login' %}">Voltar ao login</a>
    </div>
  </div>
</section>
{% endblock %}
