{% extends 'base.html' %}
{% block content %}
<section class="hero">
  <div class="card auth-card">
    <h2>Definir nova senha</h2>
    {% if validlink %}
    <form method="post" class="form-grid">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Atualizar senha</button>
    </form>
    {% else %}
    <p>Este link é inválido ou já foi utilizado.</p>
    <div class="auth-links">
      <a href="{% url 'password_reset' %}">Solicitar novo link</a>
    </div>
    {% endif %}
  </div>
</section>
{% endblock %}
